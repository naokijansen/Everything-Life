<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Naoki's Logs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Loading screen shown until API responds -->
<div id="loading">
  <div class="loading-logo">Naoki's Logs</div>
  <div class="loading-sub" id="loading-msg">Connecting…</div>
</div>

<div id="app">
  <header>
    <div>
      <div class="logo-label">Naoki's Logs</div>
      <div class="logo-name">Everything Place</div>
    </div>
    <div style="display:flex;align-items:center;">
      <!-- Small dot in header shows save status: grey=idle, yellow=saving, green=saved, red=error -->
      <div class="sync-dot" id="sync-dot" title="Sync status"></div>
      <nav id="nav">
        <button class="tab-btn active" data-tab="quadrant">Quadrant</button>
        <button class="tab-btn" data-tab="calendar">Calendar</button>
        <button class="tab-btn" data-tab="heatmap">Heatmap</button>
      </nav>
    </div>
  </header>
  <main id="main"></main>
</div>

<div id="ctx-menu"><div class="ctx-label">Move back to</div></div>
<div id="day-popup"></div>
<div id="task-ctx-menu">
  <div class="ctx-label" id="task-ctx-label">Task</div>
  <div class="ctx-item" id="task-ctx-delete">
    <div class="ctx-dot" style="background:var(--red)"></div>Delete task
  </div>
  <div class="ctx-item" id="task-ctx-today">
    <div class="ctx-dot" style="background:var(--green)"></div>Add to today's calendar
  </div>
  <div class="ctx-item" id="task-ctx-pick">
    <div class="ctx-dot" style="background:var(--blue)"></div>Add to calendar…
  </div>
</div>

<!-- Scripts load in dependency order: utils first, ui last -->
<script src="js/utils.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/heatmap.js"></script>
<script src="js/calendar.js"></script>
<script src="js/quadrant.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
